<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석하기 - 소방서 QR 출석관리</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="page-header">
    <h1>소방서 QR 출석관리</h1>
    <p class="sub">출석 확인</p>
  </header>

  <main class="container">
    <!-- 세션 없음 -->
    <section id="viewError" class="card error-session" style="display: none;">
      <h3>유효하지 않은 출석 링크입니다</h3>
      <p>QR코드를 다시 스캔하거나 관리자에게 문의하세요.</p>
    </section>

    <!-- 출석 폼 -->
    <section id="viewForm" style="display: none;">
      <div class="attend-hero">
        <h2 id="heroDate"></h2>
        <p class="session-name" id="heroEducation"></p>
      </div>
      <div class="card">
        <h2 class="card-title">출석 정보 입력</h2>
        <form id="formAttend">
          <input type="hidden" id="inputSessionId">
          <div class="form-group">
            <label for="inputName">이름</label>
            <input type="text" id="inputName" placeholder="이름을 입력하세요" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="inputDept">부서</label>
            <input type="text" id="inputDept" placeholder="부서를 입력하세요" required autocomplete="organization-title">
          </div>
          <button type="submit" class="btn btn-primary btn-block">출석 확인</button>
        </form>
      </div>
    </section>

    <!-- 출석 완료 -->
    <section id="viewDone" class="card attend-done" style="display: none;">
      <div class="icon">✓</div>
      <h3>출석이 완료되었습니다</h3>
      <p id="doneMessage"></p>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/attend.js"></script>
</body>
</html>
